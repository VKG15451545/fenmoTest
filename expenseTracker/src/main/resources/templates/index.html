<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Expense Tracker</title>
	<link rel="stylesheet" th:href="@{/app.css}"/>
</head>
<body>
<main class="container">
	<header class="header">
		<h1>Expense Tracker</h1>
		<p class="muted">Record expenses, filter by category, and see the total.</p>
	</header>

	<section class="card">
		<h2>Add expense</h2>
		<form th:action="@{/ui/expenses}" th:object="${form}" method="post" class="form" id="expenseForm">
			<input type="hidden" th:field="*{idempotencyKey}" id="idempotencyKey"/>

			<div class="grid">
				<label>
					<span>Amount (₹)</span>
					<input type="number" step="0.01" min="0" inputmode="decimal" th:field="*{amount}" required/>
					<small class="error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}">Amount error</small>
				</label>

				<label>
					<span>Date</span>
					<input type="date" th:field="*{date}" required/>
					<small class="error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}">Date error</small>
				</label>

				<label>
					<span>Category</span>
					<input type="text" maxlength="64" th:field="*{category}" placeholder="Food, Travel, Rent" required/>
					<small class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}">Category error</small>
				</label>

				<label class="span-2">
					<span>Description</span>
					<input type="text" maxlength="512" th:field="*{description}" placeholder="What was this for?" required/>
					<small class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description error</small>
				</label>
			</div>

			<div class="row">
				<button type="submit" id="submitBtn">Add</button>
				<span class="muted" id="submitHint">Safe on double-click and refresh.</span>
			</div>
		</form>
	</section>

	<section class="card">
		<div class="row space-between">
			<div>
				<h2>Expenses</h2>
				<p class="muted">Sorted by date (newest first).</p>
			</div>
			<div class="total">
				<span class="muted">Total</span>
				<strong th:text="${'₹' + total}">₹0.00</strong>
			</div>
		</div>

		<form method="get" th:action="@{/}" class="row">
			<label class="inline">
				<span class="muted">Filter category</span>
				<select name="category">
					<option value="" th:selected="${selectedCategory == ''}">All</option>
					<option th:each="c: ${categories}" th:value="${c}" th:text="${c}" th:selected="${selectedCategory == c}">Category</option>
				</select>
			</label>
			<button type="submit" class="secondary">Apply</button>
			<a class="link" th:href="@{/}">Clear</a>
		</form>

		<div class="table-wrap">
			<table>
				<thead>
				<tr>
					<th>Date</th>
					<th>Category</th>
					<th>Description</th>
					<th class="right">Amount (₹)</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(expenses)}">
					<td colspan="4" class="muted">No expenses yet.</td>
				</tr>
				<tr th:each="e : ${expenses}">
					<td th:text="${e.date()}">2026-04-24</td>
					<td th:text="${e.category()}">Food</td>
					<td th:text="${e.description()}">Lunch</td>
					<td class="right" th:text="${e.amount()}">0.00</td>
				</tr>
				</tbody>
			</table>
		</div>
	</section>
</main>

<script>
  // Prevent accidental double submits; idempotency key still protects server-side.
  (function () {
    const form = document.getElementById('expenseForm');
    const btn = document.getElementById('submitBtn');
    if (!form || !btn) return;
    form.addEventListener('submit', () => {
      btn.disabled = true;
      btn.textContent = 'Adding…';
    });
  })();
</script>
</body>
</html>
